<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0a06">
<title>The Mobile Campaign — 3D Map</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Oswald:wght@300;400;500&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.js"></script>
<style>
/* ══════════════════════════════════
   RESET & TOKENS
══════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink:     #0d0a06;
  --smoke:   #1a1208;
  --panel:   #11100a;
  --parch:   #f2ead8;
  --sand:    #d4bc96;
  --aged:    #7a5230;
  --cannon:  #b5922a;
  --rust:    #8c2e18;
  --union:   #1a3a5c;
  --pb:      rgba(181,146,42,.18);
  --pbh:     rgba(181,146,42,.35);

  /* safe area insets for notch phones */
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left:   env(safe-area-inset-left,  0px);
  --safe-right:  env(safe-area-inset-right, 0px);

  /* Sheet snap heights */
  --sheet-peek:   92px;   /* just the handle + title bar */
  --sheet-mid:    46vh;   /* half open */
  --sheet-full:   88vh;   /* fully open */
}
html, body {
  height: 100%; width: 100%; overflow: hidden;
  background: var(--ink);
  font-family: "EB Garamond", Georgia, serif;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

/* ══════════════════════════════════
   MAP — full bleed
══════════════════════════════════ */
#map {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  z-index: 0;
}
.maplibregl-canvas { touch-action: none; }

/* ══════════════════════════════════
   TOP BAR — glassy header
══════════════════════════════════ */
#top-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
  padding: calc(var(--safe-top) + 8px) 12px 8px;
  background: linear-gradient(to bottom, rgba(10,8,4,.92) 0%, rgba(10,8,4,0) 100%);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  pointer-events: none;
}
#top-bar-left {
  display: flex;
  flex-direction: column;
  pointer-events: auto;
}
.top-home {
  margin-top: 8px;
  font-family: Oswald, sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--sand);
  text-decoration: none;
}
.top-home:hover { color: var(--cannon); }
.tb-eye {
  font-family: Oswald, sans-serif; font-weight: 300;
  font-size: .58rem; letter-spacing: .32em; text-transform: uppercase;
  color: var(--cannon);
}
.tb-title {
  font-family: "Playfair Display", serif; font-weight: 900;
  font-size: 1.05rem; color: var(--parch); line-height: 1.1;
}

/* ── 3D TOGGLE CHIP ── */
#top-controls {
  display: flex; gap: 6px; pointer-events: auto;
}
.icon-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: rgba(10,8,4,.85);
  border: 1px solid var(--pb);
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; cursor: pointer;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: var(--sand);
  transition: border-color .15s, background .15s;
  flex-shrink: 0;
}
.icon-btn:active { background: rgba(181,146,42,.2); border-color: var(--cannon); }
.icon-btn.on { border-color: var(--cannon); color: var(--cannon); background: rgba(181,146,42,.12); }

/* ══════════════════════════════════
   TIMELINE CHIPS — horizontal scroll
══════════════════════════════════ */
#timeline-row {
  position: fixed;
  top: calc(var(--safe-top) + 60px);
  left: 0; right: 0;
  z-index: 200;
  padding: 0 12px;
  display: flex;
  gap: 6px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  pointer-events: auto;
}
#timeline-row::-webkit-scrollbar { display: none; }
.tl-chip {
  flex-shrink: 0;
  font-family: Oswald, sans-serif; font-weight: 300;
  font-size: .62rem; letter-spacing: .12em; text-transform: uppercase;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--pb);
  color: rgba(212,188,150,.5);
  background: rgba(10,8,4,.82);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.tl-chip.active {
  background: var(--cannon);
  color: var(--ink);
  border-color: var(--cannon);
  font-weight: 500;
}
.tl-chip:active { opacity: .75; }

/* ══════════════════════════════════
   BOTTOM SHEET
══════════════════════════════════ */
#sheet {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  z-index: 300;
  background: var(--panel);
  border-radius: 18px 18px 0 0;
  border-top: 1px solid var(--pbh);
  /* Will be controlled by JS transform */
  transform: translateY(calc(100% - var(--sheet-peek)));
  transition: transform .35s cubic-bezier(.32,.72,0,1);
  max-height: var(--sheet-full);
  display: flex;
  flex-direction: column;
  /* Account for home indicator */
  padding-bottom: var(--safe-bottom);
  /* Shadow */
  box-shadow: 0 -8px 32px rgba(0,0,0,.6);
  will-change: transform;
}

/* Sheet states */
#sheet.peek    { transform: translateY(calc(100% - var(--sheet-peek))); }
#sheet.half    { transform: translateY(calc(100% - var(--sheet-mid))); }
#sheet.full    { transform: translateY(calc(100% - var(--sheet-full))); }

/* ── Drag handle ── */
#sheet-handle-area {
  padding: 10px 0 2px;
  display: flex;
  flex-direction: column;
  align-items: center;
  flex-shrink: 0;
  cursor: grab;
  user-select: none;
  -webkit-user-select: none;
}
#sheet-handle-area:active { cursor: grabbing; }
#sheet-handle {
  width: 36px; height: 4px;
  border-radius: 2px;
  background: rgba(181,146,42,.35);
}

/* ── Sheet header (always visible in peek) ── */
#sheet-header {
  padding: 6px 16px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  border-bottom: 1px solid var(--pb);
}
#sheet-title {
  font-family: "Playfair Display", serif;
  font-size: .92rem; font-weight: 700;
  color: var(--parch);
}
#sheet-count {
  font-family: Oswald, sans-serif; font-weight: 300;
  font-size: .62rem; letter-spacing: .12em;
  color: var(--aged);
}

/* ── Filter pills inside sheet ── */
#filter-row {
  padding: 8px 12px;
  display: flex;
  gap: 5px;
  overflow-x: auto;
  flex-shrink: 0;
  border-bottom: 1px solid var(--pb);
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
#filter-row::-webkit-scrollbar { display: none; }
.filter-pill {
  flex-shrink: 0;
  font-family: Oswald, sans-serif; font-weight: 300;
  font-size: .6rem; letter-spacing: .1em; text-transform: uppercase;
  padding: 5px 11px; border-radius: 14px;
  border: 1px solid var(--pb);
  color: var(--sand); background: transparent;
  cursor: pointer; transition: all .15s;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.filter-pill.active {
  background: var(--cannon); color: var(--ink);
  border-color: var(--cannon); font-weight: 500;
}
.filter-pill:active { opacity: .7; }

/* ── Location list ── */
#loc-list {
  flex: 1; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding: 4px 0;
  scrollbar-width: none;
}
#loc-list::-webkit-scrollbar { display: none; }

.loc-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid rgba(181,146,42,.06);
  cursor: pointer;
  transition: background .12s;
  -webkit-tap-highlight-color: transparent;
}
.loc-item:active, .loc-item.selected {
  background: rgba(181,146,42,.09);
}
.loc-dot {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
  border: 2px solid transparent;
}
.loc-text { flex: 1; min-width: 0; }
.loc-name {
  font-family: "Playfair Display", serif;
  font-size: .9rem; font-weight: 700;
  color: var(--parch);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.loc-date {
  font-family: Oswald, sans-serif; font-weight: 300;
  font-size: .58rem; letter-spacing: .1em;
  color: var(--cannon); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.loc-arrow {
  color: rgba(181,146,42,.3); font-size: .8rem; flex-shrink: 0;
}

/* ══════════════════════════════════
   DETAIL CARD — slides up over list
══════════════════════════════════ */
#detail-card {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  /* Height will be set dynamically; matches sheet inner */
  background: var(--panel);
  border-radius: 18px 18px 0 0;
  border-top: 1px solid var(--pbh);
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.32,.72,0,1);
  display: flex; flex-direction: column;
  padding-bottom: var(--safe-bottom);
  overflow: hidden;
  z-index: 10;
}
#detail-card.visible { transform: translateY(0); }

#detail-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--pb);
  flex-shrink: 0;
}
#detail-back {
  font-family: Oswald, sans-serif; font-weight: 300;
  font-size: .62rem; letter-spacing: .15em; text-transform: uppercase;
  color: var(--cannon); cursor: pointer; margin-bottom: 6px;
  display: inline-flex; align-items: center; gap: 4px;
  -webkit-tap-highlight-color: transparent;
}
#detail-back:active { opacity: .6; }
#detail-cat {
  font-family: Oswald, sans-serif; font-weight: 300;
  font-size: .58rem; letter-spacing: .25em; text-transform: uppercase;
  color: var(--aged); margin-bottom: 3px;
}
#detail-title {
  font-family: "Playfair Display", serif;
  font-size: 1.15rem; font-weight: 900;
  color: var(--parch); line-height: 1.15;
}
#detail-date {
  font-family: Oswald, sans-serif; font-weight: 300;
  font-size: .65rem; letter-spacing: .12em;
  color: var(--cannon); margin-top: 4px;
}

#detail-body {
  flex: 1; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px 16px 16px;
  scrollbar-width: none;
}
#detail-body::-webkit-scrollbar { display: none; }
.d-stats {
  display: flex; flex-wrap: wrap; gap: 5px;
  margin-bottom: 12px;
}
.d-stat {
  font-family: Oswald, sans-serif; font-weight: 300;
  font-size: .63rem; letter-spacing: .07em;
  padding: 4px 9px;
  border: 1px solid var(--pb); border-radius: 3px;
  color: var(--sand);
}
.d-stat span { color: var(--cannon); font-weight: 500; }
.d-text { font-size: .88rem; color: var(--sand); line-height: 1.65; }
.d-text p { margin-bottom: .75rem; }
.d-text em { color: var(--parch); font-style: italic; }

/* ══════════════════════════════════
   POPUP (map)
══════════════════════════════════ */
.maplibregl-popup-content {
  background: rgba(10,8,4,.96) !important;
  border: 1px solid var(--pb) !important;
  border-radius: 10px !important;
  padding: 10px 13px !important;
  box-shadow: 0 6px 24px rgba(0,0,0,.8) !important;
  max-width: 220px;
  font-family: "EB Garamond", serif !important;
}
.maplibregl-popup-tip { border-top-color: rgba(10,8,4,.96) !important; }
.maplibregl-popup-close-button {
  color: var(--aged) !important; font-size: 16px !important;
  right: 6px !important; top: 4px !important;
  line-height: 1 !important; padding: 2px !important;
}
.p-title {
  font-family: "Playfair Display", serif;
  font-size: .92rem; font-weight: 700; color: var(--parch);
  margin-bottom: 2px; padding-right: 16px;
}
.p-date {
  font-family: Oswald, sans-serif; font-weight: 300;
  font-size: .58rem; letter-spacing: .12em; text-transform: uppercase;
  color: var(--cannon); margin-bottom: 5px;
}
.p-snip { font-size: .8rem; color: var(--sand); line-height: 1.4; }
.p-btn {
  display: inline-block; margin-top: 7px;
  font-family: Oswald, sans-serif; font-weight: 400;
  font-size: .6rem; letter-spacing: .12em; text-transform: uppercase;
  color: var(--ink); background: var(--cannon);
  padding: 5px 10px; border-radius: 3px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

/* ══════════════════════════════════
   MAP CONTROLS override
══════════════════════════════════ */
.maplibregl-ctrl-group {
  background: rgba(10,8,4,.88) !important;
  border: 1px solid var(--pb) !important;
  border-radius: 8px !important;
  overflow: hidden;
}
.maplibregl-ctrl-group button {
  background: transparent !important;
  color: var(--sand) !important;
  border-bottom: 1px solid var(--pb) !important;
  width: 36px !important; height: 36px !important;
}
.maplibregl-ctrl-group button:last-child { border-bottom: none !important; }
.maplibregl-ctrl-attrib {
  background: rgba(0,0,0,.45) !important;
  color: rgba(212,188,150,.25) !important;
  font-size: .5rem !important;
}
.maplibregl-ctrl-bottom-right { bottom: calc(var(--sheet-peek) + 14px) !important; }
.maplibregl-ctrl-bottom-left  { bottom: calc(var(--sheet-peek) + 14px) !important; }

/* ══════════════════════════════════
   DESKTOP LAYOUT (≥ 768px)
══════════════════════════════════ */
@media (min-width: 768px) {
  /* On desktop, show a proper side panel instead of bottom sheet */
  #sheet {
    position: fixed;
    top: 0; left: 0; bottom: 0; right: auto;
    width: 300px;
    border-radius: 0;
    border-top: none;
    border-right: 1px solid var(--pb);
    transform: none !important;
    max-height: 100%;
    transition: none;
    padding-bottom: 0;
  }
  #sheet-handle-area { display: none; }
  #detail-card {
    border-radius: 0;
    border-top: 1px solid var(--pb);
    border-right: 1px solid var(--pb);
  }
  #top-bar {
    left: 300px;
    background: linear-gradient(to bottom, rgba(10,8,4,.7) 0%, transparent 100%);
  }
  #timeline-row { left: 300px; }
  .maplibregl-ctrl-bottom-right { bottom: 14px !important; }
  .maplibregl-ctrl-bottom-left  { bottom: 14px !important; }
  .maplibregl-ctrl-bottom-right { right: 10px !important; }
}

/* ══════════════════════════════════
   LOADING OVERLAY
══════════════════════════════════ */
#loading {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--ink);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  transition: opacity .5s;
}
#loading.hidden { opacity: 0; pointer-events: none; }
.load-title {
  font-family: "Playfair Display", serif;
  font-size: 1.6rem; font-weight: 900; color: var(--parch);
}
.load-sub {
  font-family: Oswald, sans-serif; font-weight: 300;
  font-size: .7rem; letter-spacing: .3em; text-transform: uppercase;
  color: var(--cannon);
}
.load-bar-wrap {
  width: 160px; height: 2px;
  background: rgba(181,146,42,.2); border-radius: 1px; overflow: hidden;
}
.load-bar {
  height: 100%; width: 0;
  background: var(--cannon);
  animation: loadbar 1.8s ease forwards;
}
@keyframes loadbar { to { width: 100%; } }
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loading">
  <div class="load-title">The Last Campaign</div>
  <div class="load-sub">Loading 3D Map</div>
  <div class="load-bar-wrap"><div class="load-bar"></div></div>
</div>

<!-- Map (full bleed) -->
<div id="map"></div>

<!-- Top bar -->
<div id="top-bar">
  <div id="top-bar-left">
    <span class="tb-eye">Mobile Campaign · 1864–1865</span>
    <span class="tb-title">The Last Campaign</span>
    <a href="index.html" class="top-home">Home</a>
  </div>
  <div id="top-controls">
    <div class="icon-btn" id="btn-terrain" onclick="toggleTerrain()" title="Toggle terrain">🏔</div>
    <div class="icon-btn" id="btn-reset"   onclick="resetView()"    title="Reset view">⊙</div>
  </div>
</div>

<!-- Timeline chips -->
<div id="timeline-row">
  <div class="tl-chip active" data-phase="all"        onclick="setPhase(this,'all')">Full Campaign</div>
  <div class="tl-chip"        data-phase="1864"       onclick="setPhase(this,'1864')">Aug 1864 · Bay</div>
  <div class="tl-chip"        data-phase="march1865"  onclick="setPhase(this,'march1865')">Mar 1865 · Spanish Fort</div>
  <div class="tl-chip"        data-phase="april1865"  onclick="setPhase(this,'april1865')">Apr 1865 · Blakeley</div>
</div>

<!-- Bottom sheet -->
<div id="sheet" class="peek">

  <!-- Drag handle -->
  <div id="sheet-handle-area" id="drag-handle">
    <div id="sheet-handle"></div>
  </div>

  <!-- Sheet header -->
  <div id="sheet-header">
    <span id="sheet-title">Locations</span>
    <span id="sheet-count"></span>
  </div>

  <!-- Filter pills -->
  <div id="filter-row">
    <div class="filter-pill active" data-f="all"    onclick="setFilter(this,'all')">All</div>
    <div class="filter-pill"        data-f="fort"   onclick="setFilter(this,'fort')">⚔ Forts</div>
    <div class="filter-pill"        data-f="naval"  onclick="setFilter(this,'naval')">⚓ Naval</div>
    <div class="filter-pill"        data-f="land"   onclick="setFilter(this,'land')">🪖 Land</div>
    <div class="filter-pill"        data-f="wreck"  onclick="setFilter(this,'wreck')">💀 Wrecks</div>
    <div class="filter-pill"        data-f="city"   onclick="setFilter(this,'city')">🏙 Cities</div>
  </div>

  <!-- Location list -->
  <div id="loc-list"></div>

  <!-- Detail card (slides over list inside sheet) -->
  <div id="detail-card">
    <div id="detail-header">
      <div id="detail-back" onclick="closeDetail()">← Back to list</div>
      <div id="detail-cat"></div>
      <div id="detail-title"></div>
      <div id="detail-date"></div>
    </div>
    <div id="detail-body">
      <div class="d-stats" id="detail-stats"></div>
      <div class="d-text"  id="detail-text"></div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
//  DATA
// ════════════════════════════════════════════════════
const LOCATIONS = [
  // ── FORTS ──
  {
    id:'fort-morgan', name:'Fort Morgan', type:'fort', side:'confederate',
    lat:30.228, lng:-88.019,
    date:'Built 1819–1834 · Battle Aug 5–23, 1864',
    phase:['1864','all'],
    snippet:'46-gun star fort guarding the main ship channel into Mobile Bay',
    detail:`<p>The most formidable of the three Confederate forts defending the entrance to Mobile Bay, Fort Morgan sat on the tip of Mobile Point on the eastern shore. Built between 1819 and 1834, this three-tiered brick star fort mounted 46 guns — primarily 32-pounders, 10-inch Columbiads, and 7- and 8-inch Brooke rifles. About 38 guns could bear on the main ship channel, only 500 yards away.</p><p>On August 5, 1864, Fort Morgan opened fire on Farragut's fleet at 7:06 a.m. Its guns damaged several Union ships and contributed to the chaos when the USS Tecumseh sank nearby. Commander Brig. Gen. Richard Page refused surrender demands, declaring: <em>"I am prepared to sacrifice life and will only surrender when I have no means of defense."</em> After a two-week bombardment — including fire from the captured and re-commissioned CSS Tennessee — Page surrendered on August 23, 1864.</p>`,
    stats:[{label:'Guns',val:'46'},{label:'Garrison',val:'~400'},{label:'Surrendered',val:'Aug 23, 1864'}]
  },
  {
    id:'fort-gaines', name:'Fort Gaines', type:'fort', side:'confederate',
    lat:30.251, lng:-88.075,
    date:'Battle Aug 3–8, 1864',
    phase:['1864','all'],
    snippet:'26-gun fort on Dauphin Island guarding the western bay entrance',
    detail:`<p>Fort Gaines stood on the eastern tip of Dauphin Island, guarding the western side of the channel into Mobile Bay. It mounted 26 guns and held a garrison of about 600 men under Col. Charles D. Anderson. On August 3, 1864, Union General Gordon Granger landed 1,500 infantry on the western end of Dauphin Island and advanced to invest the fort.</p><p>With Fort Gaines largely outflanked after Farragut's fleet entered the bay on August 5, and with no prospect of naval support after the CSS Tennessee surrendered, Anderson made the decision to surrender. On August 8, 1864, he capitulated — a decision that drew sharp criticism from Confederate commanders. Some 800 prisoners were taken and the western entrance to Mobile Bay was secured.</p>`,
    stats:[{label:'Guns',val:'26'},{label:'Garrison',val:'~600'},{label:'Surrendered',val:'Aug 8, 1864'}]
  },
  {
    id:'fort-powell', name:'Fort Powell', type:'fort', side:'confederate',
    lat:30.267, lng:-88.148,
    date:'Abandoned Aug 5, 1864',
    phase:['1864','all'],
    snippet:'Smallest of the three Mobile Bay forts, guarding Grant\'s Pass',
    detail:`<p>Fort Powell was the smallest of the three Confederate forts defending Mobile Bay's entrance, mounting 18 guns and garrisoning about 140 men. It guarded Grant's Pass — the shallow western channel into Mississippi Sound. When Farragut's fleet entered the bay on August 5 and the Union monitor Chickasaw came to bombard it from the rear, the fort's situation became untenable. That evening, its garrison blew up the magazine and evacuated, abandoning the position without a fight.</p>`,

// ════════════════════════════════════════════════════
//  SHEET DRAG LOGIC
// ════════════════════════════════════════════════════
const sheet = document.getElementById('sheet');
const handleArea = document.getElementById('sheet-handle-area');

let dragStartY = 0, dragStartT = 0, isDragging = false;

function snapSheet(state) {
  sheetState = state;
  sheet.className = state;
}

function onDragStart(clientY) {
  isDragging = true;
  dragStartY = clientY;
  dragStartT = Date.now();
  sheet.style.transition = 'none';
}

function onDragMove(clientY) {
  if (!isDragging) return;
  const dy = clientY - dragStartY;
  const states = { peek: window.innerHeight * 0.08, half: window.innerHeight * 0.46, full: window.innerHeight * 0.88 };
  const curPx = states[sheetState] || states.peek;
  const newH = Math.max(92, Math.min(window.innerHeight * 0.92, curPx - dy));
  const pct = (newH / window.innerHeight) * 100;
  sheet.style.transform = `translateY(calc(100% - ${pct}vh))`;
}

function onDragEnd(clientY) {
  if (!isDragging) return;
  isDragging = false;
  sheet.style.transition = '';
  sheet.style.transform = '';

  const dy = clientY - dragStartY;
  const dt = Date.now() - dragStartT;
  const vel = Math.abs(dy) / dt; // px/ms

  if (vel > 0.5) {
    // flick gesture
    snapSheet(dy < 0 ? (sheetState === 'peek' ? 'half' : 'full') : (sheetState === 'full' ? 'half' : 'peek'));
  } else {
    // position-based snap
    if (dy < -50) snapSheet(sheetState === 'peek' ? 'half' : 'full');
    else if (dy > 50) snapSheet(sheetState === 'full' ? 'half' : 'peek');
    // else stay same state
    sheet.className = sheetState;
  }
}

// Touch events
handleArea.addEventListener('touchstart', e => { onDragStart(e.touches[0].clientY); }, { passive: true });
window.addEventListener('touchmove', e => {
  if (!isDragging) return;
  onDragMove(e.touches[0].clientY);
}, { passive: true });
window.addEventListener('touchend', e => { onDragEnd(e.changedTouches[0].clientY); }, { passive: true });

// Mouse events (desktop)
handleArea.addEventListener('mousedown', e => { onDragStart(e.clientY); });
window.addEventListener('mousemove', e => { if (isDragging) onDragMove(e.clientY); });
window.addEventListener('mouseup', e => { onDragEnd(e.clientY); });

// Tap on header = toggle half/peek
document.getElementById('sheet-header').addEventListener('click', () => {
  if (isMobile) snapSheet(sheetState === 'peek' ? 'half' : 'peek');
});

// ════════════════════════════════════════════════════
//  CAMERA PRESETS
// ════════════════════════════════════════════════════
const PHASE_VIEWS = {
  all:       { center:[-87.97,30.46], zoom:isMobile?8.6:9.4, pitch:isMobile?38:50, bearing:-15 },
  '1864':    { center:[-88.04,30.28], zoom:isMobile?10.5:11.4, pitch:isMobile?50:62, bearing:20 },
  march1865: { center:[-87.93,30.67], zoom:isMobile?11.2:12.2, pitch:isMobile?48:58, bearing:-28 },
  april1865: { center:[-87.92,30.73], zoom:isMobile?11.8:12.8, pitch:isMobile?52:65, bearing:-10 },
};

function resetView() {
  const v = PHASE_VIEWS[curPhase] || PHASE_VIEWS.all;
  map.flyTo({ ...v, duration: 1600, essential: true });
}

function toggleTerrain() {
  terrainOn = !terrainOn;
  document.getElementById('btn-terrain').classList.toggle('on', terrainOn);
  if (terrainOn) {
    if (!map.getSource('dem')) {
      map.addSource('dem', { type:'raster-dem', url:'https://demotiles.maplibre.org/terrain-tiles/tiles.json', tileSize:256 });
    }
    map.setTerrain({ source:'dem', exaggeration: isMobile ? 6 : 8 });
    map.setPitch(isMobile ? 52 : 65);
  } else {
    map.setTerrain(null);
  }
}

// ════════════════════════════════════════════════════
//  MAP LOAD
// ════════════════════════════════════════════════════
map.on('load', () => {
  addBattleZones();
  addLines();
  addLocations();
  buildList();
  // Hide loading
  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
    setTimeout(() => document.getElementById('loading').remove(), 600);
  }, 1200);
  // Animate in
  setTimeout(() => {
    map.flyTo({ center:[-87.97,30.46], zoom:isMobile?8.8:9.5, pitch:isMobile?40:52, bearing:-15, duration:2000, essential:true });
  }, 500);
});

// ════════════════════════════════════════════════════
//  BATTLE ZONE FILLS (extruded)
// ════════════════════════════════════════════════════
function addBattleZones() {
  const zones = [
    { id:'z-bay',  color:'rgba(26,58,92,0.3)',    h:80, phase:['1864','all'],
      ring:[[-88.10,30.22],[-88.05,30.20],[-88.00,30.22],[-87.95,30.28],[-87.90,30.38],[-87.88,30.50],[-87.92,30.62],[-88.00,30.65],[-88.10,30.60],[-88.18,30.48],[-88.16,30.35],[-88.10,30.22]] },
    { id:'z-sf',   color:'rgba(181,100,42,0.22)', h:55, phase:['march1865','all'],
      ring:[[-87.95,30.655],[-87.88,30.655],[-87.88,30.695],[-87.95,30.695],[-87.95,30.655]] },
    { id:'z-bl',   color:'rgba(46,107,46,0.22)',  h:55, phase:['april1865','all'],
      ring:[[-87.97,30.705],[-87.88,30.705],[-87.88,30.752],[-87.97,30.752],[-87.97,30.705]] },
  ];
  zones.forEach(z => {
    map.addSource(z.id, { type:'geojson', data:{ type:'Feature', geometry:{ type:'Polygon', coordinates:[z.ring] }, properties:{} } });
    map.addLayer({ id:z.id, type:'fill-extrusion', source:z.id,
      paint:{ 'fill-extrusion-color':z.color,'fill-extrusion-height':z.h,'fill-extrusion-base':0,'fill-extrusion-opacity':0.55 }
    });
  });
}

// ════════════════════════════════════════════════════
//  MOVEMENT LINES + ANIMATED DOTS
// ════════════════════════════════════════════════════
function addLines() {
  LINES.forEach(line => {
    const coords = line.coords.map(c=>[c[1],c[0]]);
    const sid = 'line-'+line.id;
    map.addSource(sid, { type:'geojson', data:{ type:'Feature', geometry:{ type:'LineString', coordinates:coords }, properties:{} } });
    map.addLayer({ id:sid, type:'line', source:sid,
      layout:{ 'line-join':'round','line-cap':'round' },
      paint:{ 'line-color':line.color, 'line-width':line.weight||2, 'line-opacity':line.opacity||0.7,
        ...(line.dash ? { 'line-dasharray': line.dash.split(' ').map(Number) } : {}) }
    });
    addDot(line, coords);
  });
}

const dotAnims = {};
function addDot(line, coords) {
  const did = 'dot-'+line.id;
  map.addSource(did, { type:'geojson', data:{ type:'Feature', geometry:{ type:'Point', coordinates:coords[0] }, properties:{} } });
  const isUnion = line.color.includes('2a5f') || line.color.includes('3a6b');
  map.addLayer({ id:did, type:'circle', source:did,
    paint:{ 'circle-radius':3.5, 'circle-color': isUnion?'#4a90c4':'#c8a030',
      'circle-opacity':0.9, 'circle-stroke-width':1, 'circle-stroke-color':'rgba(255,255,255,.45)' }
  });
  let step = Math.floor(Math.random() * 180);
  const total = 200;
  const n = coords.length - 1;
  (function tick() {
    step = (step+1)%total;
    const t = step/total, seg = Math.min(Math.floor(t*n), n-1), st = t*n-seg;
    const p1=coords[seg], p2=coords[Math.min(seg+1,n)];
    map.getSource(did)?.setData({ type:'Feature', geometry:{ type:'Point', coordinates:[p1[0]+(p2[0]-p1[0])*st, p1[1]+(p2[1]-p1[1])*st] }, properties:{} });
    dotAnims[did] = requestAnimationFrame(tick);
  })();
}

// ════════════════════════════════════════════════════
//  LOCATION CIRCLES
// ════════════════════════════════════════════════════
function addLocations() {
  const features = LOCATIONS.map(loc=>({
    type:'Feature',
    properties:{ id:loc.id, name:loc.name, color:getColor(loc), phase:JSON.stringify(loc.phase||['all']) },
    geometry:{ type:'Point', coordinates:[loc.lng, loc.lat] }
  }));
  map.addSource('locs', { type:'geojson', data:{ type:'FeatureCollection', features } });

  // Glow ring
  map.addLayer({ id:'locs-glow', type:'circle', source:'locs',
    paint:{ 'circle-radius':['interpolate',['linear'],['zoom'],7,12,13,24],
      'circle-color':['get','color'], 'circle-opacity':0.15, 'circle-blur':1 }
  });
  // Main dot
  map.addLayer({ id:'locs-dots', type:'circle', source:'locs',
    paint:{ 'circle-radius':['interpolate',['linear'],['zoom'],7,5,13,11],
      'circle-color':['get','color'], 'circle-opacity':0.95,
      'circle-stroke-width':['interpolate',['linear'],['zoom'],7,1.5,13,2.5],
      'circle-stroke-color':'rgba(255,255,255,.75)' }
  });
  // Labels (only at zoom ≥ 10)
  map.addLayer({ id:'locs-labels', type:'symbol', source:'locs',
    layout:{ 'text-field':['get','name'], 'text-font':['Noto Sans Regular'],
      'text-size':['interpolate',['linear'],['zoom'],10,9,13,12],
      'text-offset':[0,1.3], 'text-anchor':'top', 'text-max-width':9 },
    paint:{ 'text-color':'#f2ead8', 'text-halo-color':'rgba(0,0,0,.85)', 'text-halo-width':1.5,
      'text-opacity':['interpolate',['linear'],['zoom'],9.5,0,10.5,1] }
  });

  // Click
  map.on('click','locs-dots', e => {
    const id = e.features[0].properties.id;
    selectLoc(id);
    e.originalEvent._handled = true;
  });
  map.on('mouseenter','locs-dots', ()=>{ map.getCanvas().style.cursor='pointer'; });
  map.on('mouseleave','locs-dots', ()=>{ map.getCanvas().style.cursor=''; });

  // Pulse animation
  let p=0, pd=1;
  (function pulse(){
    p+=pd*0.25; if(p>6||p<0)pd*=-1;
    if(map.getLayer('locs-glow')) map.setPaintProperty('locs-glow','circle-opacity',0.1+p*0.013);
    requestAnimationFrame(pulse);
  })();
}

// ════════════════════════════════════════════════════
//  PHASE FILTER
// ════════════════════════════════════════════════════
function setPhase(el, phase) {
  curPhase = phase;
  document.querySelectorAll('.tl-chip').forEach(c=>c.classList.toggle('active', c.dataset.phase===phase));
  const filter = phase==='all' ? null : ['in', phase, ['get','phase']];
  ['locs-dots','locs-glow','locs-labels'].forEach(id=>{ if(map.getLayer(id)) map.setFilter(id, filter); });
  LINES.forEach(line=>{
    const vis = phase==='all'||(line.phase&&line.phase.includes(phase));
    ['line-'+line.id,'dot-'+line.id].forEach(id=>{ if(map.getLayer(id)) map.setLayoutProperty(id,'visibility',vis?'visible':'none'); });
  });
  const v = PHASE_VIEWS[phase] || PHASE_VIEWS.all;
  map.flyTo({ ...v, duration:1800, essential:true });
  buildList();
  closeDetail();
}

// ════════════════════════════════════════════════════
//  TYPE FILTER
// ════════════════════════════════════════════════════
function setFilter(el, type) {
  curFilter = type;
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.toggle('active', p.dataset.f===type));
  buildList();
}

// ════════════════════════════════════════════════════
//  LOCATION LIST
// ════════════════════════════════════════════════════
function buildList() {
  const list = document.getElementById('loc-list');
  list.innerHTML = '';
  const items = LOCATIONS.filter(l=>{
    const mf = curFilter==='all'||l.type===curFilter;
    const mp = curPhase==='all'||(l.phase&&l.phase.includes(curPhase));
    return mf&&mp;
  });
  document.getElementById('sheet-count').textContent = items.length+' sites';
  if (!items.length) {
    list.innerHTML = '<div style="padding:20px 16px;color:var(--aged);font-style:italic;font-size:.85rem;">No locations match.</div>';
    return;
  }
  items.forEach(loc=>{
    const el = document.createElement('div');
    el.className='loc-item'+(loc.id===selectedId?' selected':'');
    el.dataset.id=loc.id;
    const c=getColor(loc);
    el.innerHTML=`
      <div class="loc-dot" style="background:${c}1a;border-color:${c}66;">${getEmoji(loc)}</div>
      <div class="loc-text">
        <div class="loc-name">${loc.name}</div>
        <div class="loc-date">${loc.date}</div>
      </div>
      <div class="loc-arrow">›</div>`;
    el.addEventListener('click', ()=>selectLoc(loc.id));
    list.appendChild(el);
  });
}

// ════════════════════════════════════════════════════
//  SELECT + DETAIL
// ════════════════════════════════════════════════════
function selectLoc(id) {
  selectedId=id;
  const loc=LOCATIONS.find(l=>l.id===id);
  if(!loc) return;

  // Close old popup
  if(activePopup){activePopup.remove();activePopup=null;}

  // Fly to location
  map.flyTo({ center:[loc.lng,loc.lat], zoom:Math.max(map.getZoom(),11.5),
    pitch:isMobile?52:60, duration:1100, essential:true });

  // Map popup
  activePopup = new maplibregl.Popup({ closeButton:true, closeOnClick:false, maxWidth:'240px', offset:16 })
    .setLngLat([loc.lng,loc.lat])
    .setHTML(`
      <div class="p-title">${loc.name}</div>
      <div class="p-date">${loc.date}</div>
      <div class="p-snip">${loc.snippet}</div>
      <div class="p-btn" onclick="openDetailCard('${loc.id}')">Full Details</div>`)
    .addTo(map);

  // Highlight in list
  buildList();
  document.querySelector(`.loc-item[data-id="${id}"]`)?.scrollIntoView({behavior:'smooth',block:'nearest'});

  // On mobile: bring sheet to half
  if(isMobile && sheetState==='peek') snapSheet('half');

  // Show detail card
  openDetailCard(id);
}

function openDetailCard(id) {
  const loc=LOCATIONS.find(l=>l.id===id);
  if(!loc) return;
  selectedId=id;

  document.getElementById('detail-cat').textContent   = loc.type.toUpperCase()+' · '+loc.side.toUpperCase();
  document.getElementById('detail-title').textContent = loc.name;
  document.getElementById('detail-date').textContent  = loc.date;

  const stats=document.getElementById('detail-stats');
  stats.innerHTML = loc.stats ? loc.stats.map(s=>`<div class="d-stat">${s.label}: <span>${s.val}</span></div>`).join('') : '';

  document.getElementById('detail-text').innerHTML = loc.detail||'';

  document.getElementById('detail-card').classList.add('visible');
  if(isMobile) snapSheet('full');
}

function closeDetail() {
  document.getElementById('detail-card').classList.remove('visible');
  if(activePopup){activePopup.remove();activePopup=null;}
  selectedId=null;
  buildList();
  if(isMobile && sheetState==='full') snapSheet('half');
}

// Tap map background = close
map.on('click', e=>{
  if(!e.originalEvent._handled) closeDetail();
});

// ════════════════════════════════════════════════════
//  KEYBOARD (desktop)
// ════════════════════════════════════════════════════
document.addEventListener('keydown', e=>{
  if(e.key==='Escape') closeDetail();
});
</script>
